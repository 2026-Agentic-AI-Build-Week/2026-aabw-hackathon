services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kfc_ordering}
      POSTGRES_USER: ${POSTGRES_USER:-kfc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kfc_local_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kfc} -d ${POSTGRES_DB:-kfc_ordering}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres16_data:/var/lib/postgresql/data

volumes:
  postgres16_data:
